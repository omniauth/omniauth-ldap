name: Auto Assign
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: 'Auto-assign issue'
      uses: pozil/auto-assign-issue@af6beea6bdf1e8eb373f061c5bc168681fc6d011 # v4.0.1
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: "pboling"
          abortIfPreviousAssignees: true
          allowSelfAssign: true
          numOfAssignee: 1
