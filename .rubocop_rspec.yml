RSpec/MultipleExpectations:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/InstanceVariable:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/ExpectInHook:
  Enabled: false

RSpec/DescribeClass:
  Exclude:
    - 'spec/examples/*'

RSpec/MultipleMemoizedHelpers:
  Enabled: false

# Because the gem namespace is OmniAuth, but the path is not omni_auth
RSpec/SpecFilePathFormat:
  Enabled: false
